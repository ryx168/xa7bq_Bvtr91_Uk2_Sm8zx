name: Fetch Sports Data

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch-sports-data:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Checkout Sports Repository
        run: |
          # Clone the new dedicated sports repo into public/sports so scripts can write to it
          git clone https://${{ secrets.GIT_TOKEN }}@github.com/harryji168/email_solutions-sports.git public/sports

      - name: Setup Google Drive Credentials
        run: |
          if [ -n "${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}" ]; then
            echo "${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}" > credentials.json
          fi
          if [ -n "${{ secrets.GOOGLE_DRIVE_TOKEN }}" ]; then
            echo "${{ secrets.GOOGLE_DRIVE_TOKEN }}" | base64 --decode > token.pickle
          fi

      - name: Setup Git Identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Continuous Fetch Loop (Every 3 Minutes)
        run: |
          # Calculate an end time 355 minutes from now to exit gracefully before the 360m hard timeout
          END_TIME=$((SECONDS + 355 * 60))
          
          while [ $SECONDS -lt $END_TIME ]; do
            echo "=================================================="
            echo "Starting fetch cycle at $(date)"
            echo "=================================================="
            
            # 1. Fetch Live Scores and Goal Times
            python public/data/fetch_goals.py || true
            
            # 2. Upload Data to Google Drive
            python scripts/upload_folder_to_drive.py public/data --name "sports data backup" --exclude "*vancouver*" --exclude "*lead*" --exclude "*furniture*" --exclude "*business*" --exclude "*company*" --exclude "*logistics*" || true
            python scripts/upload_folder_to_drive.py public/sports --name "sports data backup" || true
            
            # 4. Commit and push updated JSON data (Main Repo)
            git add public/data/*.json || true
            git diff --quiet && git diff --staged --quiet || (git commit -m "chore(data): auto-update live scores and references" && git pull --rebase && git push)
            
            # 5. Commit and push updated Sports data (Sports Repo)
            cd public/sports
            git add .
            git diff --quiet && git diff --staged --quiet || (git commit -m "chore(data): auto-update sports references" && git pull --rebase && git push)
            cd ../..
            
            echo "Sleeping for 3 minutes..."
            sleep 180
          done
          
          echo "Finished continuous loop gracefully. Next cron job will pick up."
