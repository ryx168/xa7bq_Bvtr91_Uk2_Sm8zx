name: Fetch Analyst Data

on:
  schedule:
    # Run hourly
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch-analyst:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Setup Google Drive Credentials
        run: |
          if [ -n "${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}" ]; then
            echo "${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}" > credentials.json
          fi
          if [ -n "${{ secrets.GOOGLE_DRIVE_TOKEN }}" ]; then
            echo "${{ secrets.GOOGLE_DRIVE_TOKEN }}" | base64 --decode > token.pickle
          fi

      - name: Fetch and Upload Incremental Analyst Data
        run: |
          echo "Running incremental analyst data fetcher..."
          python scripts/sync_analyst_incremental.py || true

      - name: Sync to Local Repository (Commit and Push)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/sports/refs/ || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(data): auto-update analyst refs data" && git push)
