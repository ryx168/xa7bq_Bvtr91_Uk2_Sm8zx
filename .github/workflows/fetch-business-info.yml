name: Fetch Business Info

on:
  schedule:
    # Run daily at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  fetch-business:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 requests

      - name: Run Yellow Pages Scraper
        run: python scripts/scraper/yp_scraper.py

      - name: Run Deep Scraper (Extract CEOs)
        run: python scripts/scraper/deep_scraper.py

      - name: Run Enrichment (Logos and History)
        run: python scripts/scraper/enrich_business.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/vancouver_leads.json public/data/global_leads.json || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(data): auto-update business leads" && git push)
