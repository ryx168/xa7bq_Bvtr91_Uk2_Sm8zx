name: Scrape Leagues 

on:
  schedule:
    # Run at midnight every day UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger from the GitHub Actions UI

jobs:
  scrape-and-upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Puppeteer requires some system dependencies in CI, but usually ubuntu-latest handles the headless bundle.
      # If missing, it can be installed, but npm install puppeteer fetches a bundled browser.
      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Run Catalog Generator
        run: node generate_catalog.mjs

      - name: Run Incremental Scraper
        run: node scrape_all_leagues.mjs

      - name: Commit State Catalog
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add league_catalog.json || true
          git commit -m "chore: save league scraping catalog state" || true
          git push || true

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Setup Google Drive Credentials
        run: |
          if [ -n "${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}" ]; then
            echo "${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}" > credentials.json
          fi
          if [ -n "${{ secrets.GOOGLE_DRIVE_TOKEN }}" ]; then
            echo "${{ secrets.GOOGLE_DRIVE_TOKEN }}" | base64 --decode > token.pickle
          fi

      - name: Upload to Google Drive
        run: |
          python scripts/upload_folder_to_drive.py output_leagues --name "leagues data backup" || true
