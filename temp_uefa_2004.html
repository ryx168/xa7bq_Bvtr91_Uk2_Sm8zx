function ShowData(id, title)
{
	mid = id;
	var code = "";
	if (typeof(Matches[id]) == "string")
	{
		code = TableHead;
		var bgcolor = "#C6E4F5";
		for (var i=0;i<ord_arr.length;i++)
		{
			if (ord_arr[i] == id)
			{
				bgcolor = (bgcolor == "#E6F4FB") ? "#C6E4F5" : "#E6F4FB";
				code += RowData(bgcolor, run_arr[i], Start_time_arr[i], TeamA_bh_arr[i], TeamA_arr[i], score_arr[i], 
							TeamB_bh_arr[i], TeamB_arr[i], live_bh_arr[i], Memo_arr[i]);

		}
		code += "</table>";
 		document.all.c_Table.innerHTML = Matches[id] + code;
 	}
 	else if (typeof(Matches[id]) == "object")
 	{
 		if (typeof(Matches[id][0]) == "string")
 		{
	 		document.all.c_Table.innerHTML = Matches[id][0];
	 		if (typeof(document.all.Groups_Table) == "object")
	 		{
		 		code = StatTable;
		 		for (var i=1;i<Matches[id].length;i++)
		 			code += Matches[id][i];
		 		document.all.Groups_Table.innerHTML += code + "</table>";

		 	else if (typeof(document.all.Runs_Table) == "object")

	 	}

	else
	{
		code = TableHead;

			bgcolor = (bgcolor == "#E6F4FB") ? "#C6E4F5" : "#E6F4FB";
			code += RowData(bgcolor, run_arr[i], Start_time_arr[i], TeamA_bh_arr[i], TeamA_arr[i], score_arr[i], 
							TeamB_bh_arr[i], TeamB_arr[i], live_bh_arr[i], Memo_arr[i]);
		}
	}
	code += "</table>";
	document.all.Runs_Table.innerHTML = code;
}

function RowData(bgcolor, run, Start_time, TeamA_bh, TeamA, score, TeamB_bh, TeamB, live_bh, Memo)
{
	var rlt = "";
	rlt =	"<tr align=\"center\" bgcolor=\"" + bgcolor + "\">" +
			"	<td>" + run + "</td>" +
			"	<td>" + Start_time + "</td>" +
			"	<td><a href=\"javascript:Team_en(" + TeamA_bh + ")\">" + TeamA + "</a></td>" +
			"	<td><a href=\"javascript:ShowDetails_en(" + live_bh + ")\">" + score + "</a></td>" +
			"	<td><a href=\"javascript:Team_en(" + TeamB_bh + ")\">" + TeamB + "</a></td>" +
			"	<td><a href=\"javascript:ShowAnalyse_en(" + live_bh + ")\"><img src=\"//img.7m.com.cn/icon/analyse_1.gif\" border=\"0\" width=\"12\" height=\"14\"></a></td>" +
			"</tr>";
	if (Memo != "")
	{
		rlt += "<tr align=\"center\" bgcolor=\"#FFFFFF\">" +
				"	<td colspan=6>" + Memo + "</td>" +
				"</tr>";
	}
	return rlt;
}
